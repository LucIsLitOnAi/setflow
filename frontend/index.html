<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SETFLOW // COLLAB</title>
  <link rel="stylesheet" href="assets/css/heritage-reset.css">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/landing.css">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body class="theme-default">

  <!-- ── LANDING / ONBOARDING ── -->
  <div id="landing" class="landing-overlay">
    <div class="landing-content">
      <div class="landing-logo">SETFLOW</div>
      <div class="landing-subtitle">COLLABORATIVE DJ ORCHESTRATION</div>
      
      <div class="room-selector">
        <input type="text" id="room-id" placeholder="ENTER ROOM ID (e.g. LÜBECK-STUDIO)" value="demo">
        <button class="btn btn-primary" onclick="window.show()">JOIN SESSION</button>
      </div>

      <div class="landing-features">
        <div class="feature-item">
          <div class="feature-icon">🔄</div>
          <div class="feature-text">REAL-TIME SYNC</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">📻</div>
          <div class="feature-text">VINYL ENGINE</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🤝</div>
          <div class="feature-text">MULTI-DJ COLLAB</div>
        </div>
      </div>
    </div>
  </div>

  <div id="app" class="app-container" style="display:none">
    
    <!-- ── TOPBAR ── -->
    <header class="app-header">
      <div class="top-bar-left">
        <div class="logo-text">SETFLOW <span class="badge">COLLAB</span></div>
      </div>
      
      <div class="top-bar-right">
        <button id="upgrade-btn" class="btn b-out" style="border-color:var(--signal-primary);color:var(--signal-primary);margin-right:12px" onclick="upgradeToPro()">UPGRADE</button>
        <div id="pro-badge" class="status-badge" style="display:none;background:var(--signal-primary);color:var(--paper1);margin-right:12px">PRO</div>
        <div id="connection-status" class="status-badge">OFFLINE</div>
      </div>
    </header>

    <main class="main-layout">
      <!-- Left: Library & Vinyl -->
      <section class="sidebar-layout">
        <div class="tab-header">
          <button class="tab-btn active" onclick="switchTab('library')">LIBRARY</button>
          <button class="tab-btn" onclick="switchTab('vinyl')">VINYL COLLECTION</button>
        </div>

        <div id="library-panel" class="panel-content">
          <div class="search-bar">
            <input type="text" id="search-input" placeholder="SEARCH TRACKS..." oninput="UI.ren()">
          </div>
          <div id="track-list" class="track-list"></div>
        </div>

        <div id="vinyl-panel" class="panel-content" style="display:none">
          <div id="vinyl-grid" class="vinyl-grid"></div>
        </div>
      </section>

      <!-- Center: Hybrid Bridge -->
      <section class="center-layout">
        <div class="bridge-container">
          <div class="bridge-header">HYBRID BRIDGE <span class="badge">MAPPER</span></div>
          
          <div class="bridge-slots">
            <div id="hb-vinyl-list" class="hb-list"></div>
            <div class="bridge-arrow">⟷</div>
            <div id="hb-track-list" class="hb-list"></div>
          </div>

          <div class="bridge-footer">
            <div id="hb-idle" class="hb-status">SELECT BOTH SIDES TO LINK</div>
            <div id="hb-ready" class="hb-status" style="display:none">
              <span id="hb-ready-vinyl-label"></span> ⟷ <span id="hb-ready-track-label"></span>
            </div>
            <button id="hb-execute-btn" class="btn btn-primary" onclick="hbExecuteLink()">EXECUTE LINK</button>
            <div id="hb-exec-label"></div>
          </div>
        </div>
      </section>

      <!-- Right: Detail Panel -->
      <section id="pnl" class="detail-panel">
        <div id="pi" class="panel-inner"></div>
      </section>
    </main>

    <!-- ── MODALS ── -->
    <div id="vmodal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3>ADD VINYL RECORD</h3>
          <button class="close-btn" onclick="closeVModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="v-search-box">
            <input type="text" id="v-search" placeholder="SEARCH DISCOGS (Artist - Title)...">
            <button class="btn" onclick="fetchDiscogs()">SEARCH</button>
            <button class="btn" onclick="startScanner()">SCAN BARCODE</button>
          </div>
          <div id="scanner-container" style="display:none; width:100%; max-width:400px; margin:10px auto;"></div>
          <div id="v-results" class="v-results-list"></div>
          <hr>
          <div class="v-manual-form">
            <input type="text" id="v-title" placeholder="TITLE">
            <input type="text" id="v-artist" placeholder="ARTIST">
            <input type="text" id="v-label" placeholder="LABEL">
            <input type="text" id="v-year" placeholder="YEAR">
            <button class="btn btn-primary" style="width:100%" onclick="saveVinyl()">SAVE TO COLLECTION</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/app.js"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('library-panel').style.display = tab === 'library' ? 'block' : 'none';
      document.getElementById('vinyl-panel').style.display = tab === 'vinyl' ? 'block' : 'none';
      if (tab === 'vinyl') window.renderVinyl();
      if (tab === 'library') window.renderHB();
    }
  </script>
</body>
</html>
