<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SETFLOW // COLLAB</title>
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/landing.css">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="theme-default">

  <!-- ── LANDING / ONBOARDING ── -->
  <div id="lp-screen">
    <div class="lp-bg">
      <div class="lp-bg-panel"><img src="https://images.unsplash.com/photo-1603048588665-791ca8aea617?auto=format&fit=crop&q=80&w=800" alt=""></div>
      <div class="lp-bg-panel"><img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&q=80&w=800" alt=""></div>
      <div class="lp-bg-panel"><img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&q=80&w=800" alt=""></div>
    </div>

    <header class="lp-header">
      <div class="lp-title-row">
        <h1 class="lp-title">SETFLOW</h1>
        <div class="lp-led"></div>
      </div>
      <p class="lp-subtitle">YOUR DJ MUSIC ORGANIZER</p>
      <div class="lp-rule"></div>
    </header>

    <div id="lp-dropzone" class="lp-dropzone" onclick="window.show()">
      <div class="lp-drop-icon">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="var(--color-accent-steel)" stroke-width="0.75"/>
          <circle cx="12" cy="12" r="3" stroke="var(--color-accent-steel)" stroke-width="0.75"/>
          <circle cx="12" cy="12" r="0.5" fill="var(--color-accent-steel)"/>
        </svg>
      </div>
      <h2 class="lp-drop-title">DROP YOUR RECORDS HERE</h2>
      <div class="lp-drop-formats">
        DIGITAL: MP3 • WAV • AIFF • FLAC
        <div class="lp-format-rule"></div>
        ANALOG: VINYL • CD • CASSETTE • R2R TAPES
      </div>
      <div class="lp-demo-hint" onclick="event.stopPropagation(); loadDemo()">... LOAD DEMO SESSION</div>
    </div>

    <div class="lp-sysref">SETFLOW // SIGNAL READY // AWAITING INPUT</div>
  </div>
  <div class="grain-overlay"></div>

  <div id="app" class="shell" style="display:none">
    
    <!-- ── LEFT ZONE: Library & Vinyl ── -->
    <section class="zone-left">
      <header class="app-header">
        <div class="logo-text">SETFLOW <span class="badge">COLLAB</span></div>
        <div class="top-bar-right">
          <button id="upgrade-btn" class="btn b-out" onclick="upgradeToPro()">UPGRADE</button>
          <div id="pro-badge" class="status-badge" style="display:none">PRO</div>
          <div id="connection-status" class="status-badge">OFFLINE</div>
        </div>
      </header>

      <div class="tab-header">
        <button class="tab-btn active" onclick="switchTab('library')">LIBRARY</button>
        <button class="tab-btn" onclick="switchTab('vinyl')">VINYL COLLECTION</button>
      </div>

      <div id="library-panel" class="panel-content">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="SEARCH TRACKS..." oninput="UI.ren()">
        </div>
        <div id="track-list" class="track-list"></div>
      </div>

      <div id="vinyl-panel" class="panel-content" style="display:none">
        <div id="vinyl-grid" class="vinyl-grid"></div>
      </div>
    </section>

    <!-- ── MID ZONE: Hybrid Bridge Mapper ── -->
    <section class="zone-mid">
      <div class="bridge-container">
        <div class="bridge-header">HYBRID BRIDGE <span class="badge">MAPPER</span></div>
        
        <div class="bridge-slots">
          <div id="hb-vinyl-list" class="hb-list"></div>
          <div class="bridge-arrow">⟷</div>
          <div id="hb-track-list" class="hb-list"></div>
        </div>

        <div class="bridge-footer">
          <div id="hb-idle" class="hb-status">SELECT BOTH SIDES TO LINK</div>
          <div id="hb-ready" class="hb-status" style="display:none">
            <span id="hb-ready-vinyl-label"></span> ⟷ <span id="hb-ready-track-label"></span>
          </div>
          <button id="hb-execute-btn" class="btn btn-primary" onclick="hbExecuteLink()">EXECUTE LINK</button>
          <div id="hb-exec-label"></div>
        </div>
      </div>
    </section>

    <!-- ── RIGHT ZONE: Detail Panel ── -->
    <section id="pnl" class="zone-right">
      <div id="pi" class="panel-inner"></div>
    </section>

    <!-- ── MODALS ── -->
    <div id="vmodal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h3>ADD VINYL RECORD</h3>
          <button class="close-btn" onclick="closeVModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="v-search-box">
            <input type="text" id="v-search" placeholder="SEARCH DISCOGS (Artist - Title)...">
            <button class="btn" onclick="fetchDiscogs()">SEARCH</button>
            <button class="btn" onclick="startScanner()">SCAN BARCODE</button>
          </div>
          <div id="scanner-container" style="display:none; width:100%; max-width:400px; margin:10px auto;"></div>
          <div id="v-results" class="v-results-list"></div>
          <hr>
          <div class="v-manual-form">
            <input type="text" id="v-title" placeholder="TITLE">
            <input type="text" id="v-artist" placeholder="ARTIST">
            <input type="text" id="v-label" placeholder="LABEL">
            <input type="text" id="v-year" placeholder="YEAR">
            <button class="btn btn-primary" style="width:100%" onclick="saveVinyl()">SAVE TO COLLECTION</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/app.js?v=2"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('library-panel').style.display = tab === 'library' ? 'block' : 'none';
      document.getElementById('vinyl-panel').style.display = tab === 'vinyl' ? 'block' : 'none';
      if (tab === 'vinyl') window.renderVinyl();
      if (tab === 'library') window.renderHB();
    }
  </script>
</body>
</html>
